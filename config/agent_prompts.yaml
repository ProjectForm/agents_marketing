      ══════════════════════════════════════════════════════════════
      AS 4 PERSONAS — DORES ESPECÍFICAS QUE VOCÊ ENDEREÇA
      ══════════════════════════════════════════════════════════════
      FERNANDA, 27, SP (Designer MEI): mistura cartão pessoal com despesas do negócio, nunca sabe
